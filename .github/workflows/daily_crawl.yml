name: Daily Stock News Crawl

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# ⭐ 동시에 실행 방지 (충돌 해결 핵심)
concurrency:
  group: daily-news-crawl
  cancel-in-progress: true

# ⭐ push 권한
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0   # ⭐ rebase 안정화

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create data directory
      run: mkdir -p data

    - name: Run crawler
      run: python news_crawl.py
      env:
        PYTHONUNBUFFERED: 1 

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        git add data/*.csv
        git commit -m "Update news data $(date +'%Y-%m-%d')" || exit 0

        # ⭐ rebase + retry (충돌 대응)
        for i in {1..3}; do
          git pull --rebase origin main && break
          echo "Rebase failed, retrying..."
          sleep 5
        done

        git push
