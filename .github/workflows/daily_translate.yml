name: Daily Stock News Translate & Analyze

on:
  workflow_run:
    workflows: ["Daily Stock News Crawl"]  # ← daily_crawl.yml의 name과 정확히 일치
    types:
      - completed

concurrency:
  group: daily-news-translate
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  translate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run translation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}   # ← GitHub Secret에서 주입
          PYTHONUNBUFFERED: 1
        run: python translate.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/*_translated.csv
          git commit -m "Update translated news data $(date +'%Y-%m-%d')" || exit 0

          for i in {1..3}; do
            git pull --rebase origin main && break
            echo "Rebase failed, retrying..."
            sleep 5
          done

          git push
