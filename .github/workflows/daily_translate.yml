name: Daily Stock News Translate & Analyze

on:
  workflow_run:
    workflows: ["Daily Stock News Crawl"]  # ← daily_crawl.yml의 name과 정확히 일치
    types:
      - completed
  workflow_dispatch:  # ← GitHub Actions 탭에서 수동 실행 가능

concurrency:
  group: daily-news-translate-analyze
  cancel-in-progress: true

permissions:
  contents: write

jobs:
# ──────────────────────────────────────────────
# Job 1. 애널리스트 데이터 수집
# ──────────────────────────────────────────────
  collect:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install certifi

      - name: Run stock data collection
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          PYTHONUNBUFFERED: 1
        run: python collect_stock_data.py

      - name: Commit collected data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ || true
          git commit -m "chore: collect stock data $(date +'%Y-%m-%d')" || exit 0
          for i in {1..3}; do
            git pull --rebase origin main && break
            echo "Rebase failed, retrying..."
            sleep 5
          done
          git push

# ──────────────────────────────────────────────
# Job 2. 번역
# ──────────────────────────────────────────────
  translate:
    needs: collect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run translation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PYTHONUNBUFFERED: 1
        run: python translate.py

      - name: Commit translated CSVs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git commit -m "chore: translated news $(date +'%Y-%m-%d')" || exit 0
          for i in {1..3}; do
            git pull --rebase origin main && break
            echo "Rebase failed, retrying..."
            sleep 5
          done
          git push

# ──────────────────────────────────────────────
# Job 3. 감정분석 + 투자판단
# ──────────────────────────────────────────────
  analyze:
    needs: translate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run investment analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PYTHONUNBUFFERED: 1
        run: python investment_analysis.py

      - name: Commit analysis results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ || true
          git commit -m "chore: investment analysis $(date +'%Y-%m-%d')" || exit 0
          for i in {1..3}; do
            git pull --rebase origin main && break
            echo "Rebase failed, retrying..."
            sleep 5
          done
          git push
